name: Backfill Profile History

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: Optional inclusive replay start date (YYYY-MM-DD)
        required: false
        type: string
      end_date:
        description: Optional inclusive replay end date (YYYY-MM-DD)
        required: false
        type: string
      every:
        description: Replay every Nth eligible trading date
        required: false
        default: "21"
        type: string
      max_runs:
        description: Optional maximum number of replay runs
        required: false
        default: "24"
        type: string

permissions:
  contents: read

concurrency:
  group: profile-history-backfill
  cancel-in-progress: false

jobs:
  build-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download ticker data for configured symbols
        run: |
          END_DATE="$(date -u +%F)"
          SYMBOLS="$(python - <<'PY'
          import tomllib
          with open('configs/profile-matrix-daily.toml', 'rb') as handle:
              config = tomllib.load(handle)
          print(' '.join(str(symbol).strip().upper() for symbol in config['symbols']))
          PY
          )"
          for SYMBOL in ${SYMBOLS}; do
            mekubbal-download \
              --symbol "${SYMBOL}" \
              --start 2018-01-01 \
              --end "${END_DATE}" \
              --output "data/${SYMBOL,,}.csv"
          done

      - name: Run history backfill
        run: |
          ARGS=(--config configs/profile-schedule-daily.toml --reset-output)
          if [ -n "${{ inputs.start_date }}" ]; then
            ARGS+=(--start-date "${{ inputs.start_date }}")
          fi
          if [ -n "${{ inputs.end_date }}" ]; then
            ARGS+=(--end-date "${{ inputs.end_date }}")
          fi
          if [ -n "${{ inputs.every }}" ]; then
            ARGS+=(--every "${{ inputs.every }}")
          fi
          if [ -n "${{ inputs.max_runs }}" ]; then
            ARGS+=(--max-runs "${{ inputs.max_runs }}")
          fi
          mekubbal-profile-backfill "${ARGS[@]}"

      - name: Upload backfill reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-history-backfill-reports
          path: |
            logs/profile_matrix_daily/reports/**
            logs/profile_matrix_daily/symbols/*/reports/**
          if-no-files-found: error

      - name: Prepare GitHub Pages site
        run: |
          rm -rf site
          mkdir -p site/logs
          cp -R logs/profile_matrix_daily site/logs/profile_matrix_daily
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>Mekubbal Daily Reports</title>
            <meta http-equiv="refresh" content="0; url=logs/profile_matrix_daily/reports/product_dashboard.html" />
          </head>
          <body>
            <p>Redirecting to the latest market dashboard...</p>
            <p><a href="logs/profile_matrix_daily/reports/product_dashboard.html">Open dashboard</a></p>
            <ul>
              <li><a href="logs/profile_matrix_daily/reports/ticker_health_summary.html">Ticker health summary</a></li>
              <li><a href="logs/profile_matrix_daily/reports/profile_ensemble_decisions.csv">Ensemble decisions (CSV)</a></li>
              <li><a href="logs/profile_matrix_daily/reports/profile_ensemble_alerts.html">Ensemble ops alerts</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build-reports
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
