name: Daily Profile Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read

concurrency:
  group: daily-profile-pages
  cancel-in-progress: false

jobs:
  build-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download daily symbol data
        run: |
          END_DATE="$(date -u +%F)"
          for SYMBOL in AAPL MSFT NVDA; do
            mekubbal-download \
              --symbol "${SYMBOL}" \
              --start 2018-01-01 \
              --end "${END_DATE}" \
              --output "data/${SYMBOL,,}.csv"
          done

      - name: Run daily schedule
        run: mekubbal-profile-schedule --config configs/profile-schedule-daily.toml

      - name: Upload daily reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-profile-reports
          path: |
            logs/profile_matrix_daily/reports/**
            logs/profile_matrix_daily/symbols/*/reports/**
          if-no-files-found: error

      - name: Prepare GitHub Pages site
        run: |
          rm -rf site
          mkdir -p site/logs
          cp -R logs/profile_matrix_daily site/logs/profile_matrix_daily
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>Mekubbal Daily Reports</title>
            <meta http-equiv="refresh" content="0; url=logs/profile_matrix_daily/reports/product_dashboard.html" />
          </head>
          <body>
            <p>Redirecting to the latest market dashboard...</p>
            <p><a href="logs/profile_matrix_daily/reports/product_dashboard.html">Open dashboard</a></p>
            <ul>
              <li><a href="logs/profile_matrix_daily/reports/ticker_health_summary.html">Ticker health summary</a></li>
              <li><a href="logs/profile_matrix_daily/reports/profile_ensemble_decisions.csv">Ensemble decisions (CSV)</a></li>
              <li><a href="logs/profile_matrix_daily/reports/profile_ensemble_alerts.html">Ensemble ops alerts</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build-reports
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
