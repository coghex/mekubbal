[runner]
output_root = "logs/profile_runner/aapl"
profile_summary_path = "reports/profile_summary.csv"
pairwise_csv_path = "reports/pairwise_significance.csv"
pairwise_html_path = "reports/pairwise_significance.html"
dashboard_path = "reports/profile_workspace.html"
dashboard_title = "AAPL Profile Workspace"
build_dashboard = true

[data]
path = "data/aapl.csv"
refresh = false
symbol = "AAPL"
start = ""
end = ""

[comparison]
confidence_level = 0.95
bootstrap_samples = 2000
permutation_samples = 20000
seed = 7
title = "AAPL Profile Pairwise Significance"

[[profiles]]
name = "base"
config = "configs/research-control.toml"

[[profiles]]
name = "candidate"
config = "configs/research-control.candidate.toml"
