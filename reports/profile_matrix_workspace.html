<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fast Profile Matrix Workspace</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; color: #222; background: #fafafa; }
    .layout { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
    .sidebar { border-right: 1px solid #ddd; padding: 14px; background: #fff; overflow-y: auto; }
    .content { padding: 14px; }
    h1 { margin: 0 0 10px 0; font-size: 20px; }
    .subtle { color: #666; font-size: 12px; margin-bottom: 10px; }
    .controls { display: grid; gap: 8px; margin-bottom: 10px; }
    .controls input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .group-title { font-size: 12px; font-weight: 700; color: #555; margin: 10px 0 6px 0; text-transform: uppercase; letter-spacing: 0.03em; }
    .report-grid { display: grid; gap: 6px; }
    .report-button {
      text-align: left;
      border: 1px solid #d9d9d9;
      background: #f6f6f6;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .report-button.active { background: #dfeeff; border-color: #7ea9ff; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .chip { border: 1px solid #d7d7d7; border-radius: 999px; padding: 3px 8px; font-size: 12px; background: #fff; color: #555; }
    iframe { width: 100%; height: calc(100vh - 90px); border: 1px solid #ddd; border-radius: 8px; background: #fff; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Fast Profile Matrix Workspace</h1>
      <div class="subtle">Unified workspace for leaderboards and per-ticker reports.</div>
      <div class="controls">
        <input id="report-search" placeholder="Filter reports..." oninput="filterReports()" />
      </div>
      <div id="leaderboard-section" class="section-group">
        <div class="group-title">Leaderboards</div>
        <div id="leaderboard-grid" class="report-grid"><button class='report-button active' data-report-id='leaderboard::AAPL Pairwise' data-label='AAPL Pairwise' data-group='Leaderboards' onclick="showReport('leaderboard::AAPL Pairwise')">AAPL Pairwise</button><button class='report-button' data-report-id='leaderboard::MSFT Pairwise' data-label='MSFT Pairwise' data-group='Leaderboards' onclick="showReport('leaderboard::MSFT Pairwise')">MSFT Pairwise</button><button class='report-button' data-report-id='leaderboard::NVDA Pairwise' data-label='NVDA Pairwise' data-group='Leaderboards' onclick="showReport('leaderboard::NVDA Pairwise')">NVDA Pairwise</button><button class='report-button' data-report-id='leaderboard::Profile Aggregate' data-label='Profile Aggregate' data-group='Leaderboards' onclick="showReport('leaderboard::Profile Aggregate')">Profile Aggregate</button><button class='report-button' data-report-id='leaderboard::Profile Pairwise (Across Symbols)' data-label='Profile Pairwise (Across Symbols)' data-group='Leaderboards' onclick="showReport('leaderboard::Profile Pairwise (Across Symbols)')">Profile Pairwise (Across Symbols)</button></div>
      </div>
      <div id="ticker-section" class="section-group">
        <div class="group-title">Tickers</div>
        <div id="ticker-grid" class="report-grid"><button class='report-button' data-report-id='ticker::AAPL' data-label='AAPL' data-group='Tickers' onclick="showReport('ticker::AAPL')">AAPL</button><button class='report-button' data-report-id='ticker::MSFT' data-label='MSFT' data-group='Tickers' onclick="showReport('ticker::MSFT')">MSFT</button><button class='report-button' data-report-id='ticker::NVDA' data-label='NVDA' data-group='Tickers' onclick="showReport('ticker::NVDA')">NVDA</button></div>
      </div>
    </aside>
    <main class="content">
      <div class="content-header">
        <div><strong id="active-report-label"></strong></div>
        <span id="active-report-group" class="chip"></span>
      </div>
      <iframe id="report-frame" title="Dashboard report"></iframe>
    </main>
  </div>
  <script>
    const reports = [{"group": "Leaderboards", "id": "leaderboard::AAPL Pairwise", "label": "AAPL Pairwise", "src": "pairwise_significance.html"}, {"group": "Leaderboards", "id": "leaderboard::MSFT Pairwise", "label": "MSFT Pairwise", "src": "pairwise_significance.html"}, {"group": "Leaderboards", "id": "leaderboard::NVDA Pairwise", "label": "NVDA Pairwise", "src": "pairwise_significance.html"}, {"group": "Leaderboards", "id": "leaderboard::Profile Aggregate", "label": "Profile Aggregate", "src": "profile_aggregate_leaderboard.html"}, {"group": "Leaderboards", "id": "leaderboard::Profile Pairwise (Across Symbols)", "label": "Profile Pairwise (Across Symbols)", "src": "profile_pairwise_across_symbols.html"}, {"group": "Tickers", "id": "ticker::AAPL", "label": "AAPL", "src": "profile_workspace.html"}, {"group": "Tickers", "id": "ticker::MSFT", "label": "MSFT", "src": "profile_workspace.html"}, {"group": "Tickers", "id": "ticker::NVDA", "label": "NVDA", "src": "profile_workspace.html"}];
    const byId = Object.fromEntries(reports.map((entry) => [entry.id, entry]));

    function setActiveButton(reportId) {
      document.querySelectorAll('.report-button').forEach((button) => {
        button.classList.toggle('active', button.dataset.reportId === reportId);
      });
    }

    function showReport(reportId) {
      const entry = byId[reportId];
      if (!entry) return;
      const frame = document.getElementById('report-frame');
      frame.src = entry.src;
      document.getElementById('active-report-label').textContent = entry.label;
      document.getElementById('active-report-group').textContent = entry.group;
      setActiveButton(reportId);
    }

    function filterReports() {
      const query = document.getElementById('report-search').value.trim().toLowerCase();
      document.querySelectorAll('.report-button').forEach((button) => {
        const label = (button.dataset.label || '').toLowerCase();
        const matchesText = !query || label.includes(query);
        button.style.display = matchesText ? '' : 'none';
      });
      ['leaderboard-section', 'ticker-section'].forEach((sectionId) => {
        const section = document.getElementById(sectionId);
        const visible = Array.from(section.querySelectorAll('.report-button')).some((button) => button.style.display !== 'none');
        section.style.display = visible ? '' : 'none';
      });
    }

    function showTicker(ticker) {
      showReport(`ticker::${ticker}`);
    }

    showReport("leaderboard::AAPL Pairwise");
  </script>
</body>
</html>
